name: Build Rock

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
  workflow_call:
    outputs:
      rock:
        description: "The rock output of build process."
        value: ${{ jobs.build.outputs.rock }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install tox
        run: python3 -m pip install tox
      - name: YAML Lint
        run: tox -e lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup LXD
        uses: canonical/setup-lxd@main
      - name: Install dependencies
        run: |
          sudo snap install yq
          sudo snap install rockcraft --classic --edge
      - name: Build ROCK
        id: build
        run: |
          rockcraft pack --verbose

          VERSION=$(yq '.version' rockcraft.yaml)
          echo "rock=charmed-kafka-ui_${VERSION}_amd64.rock" >> $GITHUB_OUTPUT

      - name: Upload locally built ROCK artifact
        uses: actions/upload-artifact@v4
        with:
          name: charmed-kafka-ui
          path: ${{ steps.build.outputs.rock }}
    outputs:
      rock: ${{ steps.build.outputs.rock }}
