---
name: charmed-kafka-ui
base: ubuntu@24.04
version: '1.3.0'
summary: Charmed Kafka Rock OCI
description: |
  This is an OCI that provides `kafbat/kafka-ui`, intended for use in the
  Charmed Kafka UI K8s Charmed Operator.
license: Apache-2.0

platforms:
  amd64:

services:
  kafka-ui:
    override: replace
    command: |
      java \
        -Dspring.config.additional-location=$KAFKA_UI_CONFIG \
        --add-opens java.rmi/javax.rmi.ssl=ALL-UNNAMED \
        $JAVA_OPTS \
        -jar /opt/kafka-ui/libs/api-1.3.0.jar
    startup: enabled
    user: kafka-ui
    group: kafka-ui
    environment:
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
      KAFKA_UI_CONFIG: /etc/kafka-ui/application-local.yml

parts:
  kafka-ui:
    plugin: nil
    stage-packages:
      - openjdk-21-jdk
      - libpsl5
      - util-linux
      - curl
    build-environment:
      - JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
    stage-snaps:
      - charmed-kafka-ui/latest/edge
    override-build: |
      ln -s /usr/lib/jvm/java-21-openjdk-amd64/bin/java \
        $CRAFT_PART_INSTALL/usr/bin/java

      # making core dirs
      mkdir -p $CRAFT_PART_INSTALL/var/lib/pebble/default/
      mkdir -p $CRAFT_PART_INSTALL/opt/kafka-ui/
      mkdir -p $CRAFT_PART_INSTALL/etc/kafka-ui/
    organize:
      libs: opt/kafka-ui/libs/
      config: opt/kafka-ui/config/
  non-root-user:
    plugin: nil
    after: [kafka-ui]
    overlay-script: |
      # Create a user in the $CRAFT_OVERLAY chroot
      groupadd -R $CRAFT_OVERLAY -g 1001 kafka-ui
      useradd -R $CRAFT_OVERLAY -M -r -g kafka-ui -u 1001 kafka-ui
    override-prime: |
      craftctl default
      # Give permission ot the required folders
      install -d -o 1001 -g 1001 -m 770 \
        opt/kafka-ui \
        etc/kafka-ui
